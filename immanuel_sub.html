    <script>
        window.onload = function() {
            if(localStorage.getItem("login_success") === "true") {
                document.getElementById("login-screen").style.display = "none";
                document.getElementById("main-app").style.display = "block";
            }
        };

        function checkLogin() {
            var inputPw = document.getElementById("app-password").value;

            if(!inputPw) {
                alert("비밀번호를 입력해주세요.");
                return;
            }

            try {
                // [안전장치] 파이어베이스 자체가 연결 안 되었을 때 잡아내기
                if (typeof firebase === 'undefined' || !firebase.database) {
                    alert("⚠️ 파이어베이스가 연결되지 않았습니다!\n기존 코드의 파이어베이스 설정(<script src=...>)이 지워졌거나 순서가 잘못되었습니다.");
                    return; // 여기서 멈춤
                }

                // DB에서 비번 가져오기 시도
                firebase.database().ref('settings/app_password').once('value')
                .then(function(snapshot) {
                    var adminPw = snapshot.val();
                    if(adminPw === null) { adminPw = "1234"; } // DB에 비번 설정 안 했을 때 기본값

                    if (inputPw === String(adminPw)) {
                        localStorage.setItem("login_success", "true"); 
                        document.getElementById("login-screen").style.display = "none";
                        document.getElementById("main-app").style.display = "block";
                    } else {
                        alert("비밀번호가 틀렸습니다.");
                        document.getElementById("app-password").value = ""; 
                    }
                })
                .catch(function(error) {
                    alert("⚠️ DB 접근 오류: " + error.message + "\n(데이터베이스 규칙 문제일 수 있습니다)");
                });

            } catch(e) {
                alert("⚠️ 알 수 없는 오류 발생: " + e.message);
            }
        }
    </script>
