<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>임마누엘 출석부 (목자용)</title>
    <style>
        /* 로그인 화면 디자인 */
        #login-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh; /* 화면 전체 높이 사용 */
            background-color: #f4f4f9;
        }
        .login-box {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            text-align: center;
            width: 80%;
            max-width: 350px;
        }
        .login-box h2 {
            margin-top: 0;
            color: #333;
        }
        .login-box input {
            width: 100%;
            padding: 12px;
            margin: 15px 0;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box; /* 패딩 포함 너비 계산 */
        }
        .login-box button {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        .login-box button:hover {
            background-color: #45a049;
        }
        
        /* 진짜 출석부 화면은 처음엔 숨겨둡니다 */
        #main-app {
            display: none; 
        }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h2>임마누엘 출석부</h2>
            <p style="color: #666; font-size: 14px;">목자용 비밀번호를 입력해주세요.</p>
            <input type="password" id="app-password" placeholder="비밀번호 입력">
            <button onclick="checkLogin()">입장하기</button>
        </div>
    </div>

    <div id="main-app">
        
        </div>

    <script>
        // 파이어베이스 초기화(firebase.initializeApp) 코드는 이 파일 어딘가에 이미 있어야 합니다!

        // [핵심 로직] 페이지가 켜질 때, 예전에 로그인한 적이 있는지 검사합니다.
        window.onload = function() {
            // 브라우저 저장소(localStorage)에 'login_success'라는 도장이 찍혀있다면?
            if(localStorage.getItem("login_success") === "true") {
                document.getElementById("login-screen").style.display = "none"; // 로그인 화면 숨기기
                document.getElementById("main-app").style.display = "block";  // 출석부 화면 보이기
            }
        };

        // [핵심 로직] 입장하기 버튼을 눌렀을 때 실행되는 함수
        function checkLogin() {
            var inputPw = document.getElementById("app-password").value; // 사용자가 친 비밀번호

            if(!inputPw) {
                alert("비밀번호를 입력해주세요.");
                return;
            }

            // 파이어베이스 DB의 'settings/app_password' 경로에서 비밀번호를 가져옵니다.
            firebase.database().ref('settings/app_password').once('value')
            .then(function(snapshot) {
                var adminPw = snapshot.val(); // DB에 저장된 진짜 비밀번호

                // 만약 관리자가 DB에 비밀번호를 설정 안 해뒀을 때를 대비한 안전장치 (기본값 1234)
                if(adminPw === null) {
                    adminPw = "1234"; 
                }

                // 입력한 비밀번호와 DB의 비밀번호가 일치하는지 확인
                if (inputPw === String(adminPw)) {
                    // 로그인 성공!
                    // 다음에 들어올 때 또 비번 안 치게 브라우저에 도장을 찍어둡니다.
                    localStorage.setItem("login_success", "true"); 
                    
                    // 화면 전환
                    document.getElementById("login-screen").style.display = "none";
                    document.getElementById("main-app").style.display = "block";
                } else {
                    // 로그인 실패
                    alert("비밀번호가 틀렸습니다. 다시 확인해주세요!");
                    document.getElementById("app-password").value = ""; // 입력칸 비워주기
                }
            })
            .catch(function(error) {
                alert("비밀번호 확인 중 오류가 발생했습니다: " + error.message);
            });
        }
    </script>

</body>
</html>
