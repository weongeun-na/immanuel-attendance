<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>2026년 임마누엘 목장 출석부 (목자용)</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⛪️</text></svg>">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⛪️</text></svg>">
    
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; margin: 0; padding: 5px; background-color: #f4f4f9; }
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 5px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .header { display: flex; flex-direction: column; align-items: center; border: 2px solid #333; padding: 10px 5px; margin-bottom: 5px; text-align: center; }
        .header-title { font-size: 16px; font-weight: bold; }
        .date-input { font-size: 16px; border: none; outline: none; color: #0044cc; font-weight: bold; text-align: center; cursor: pointer; }
        .week-label { font-size: 11px; color: #666; font-weight: bold; }
        .summary-box { display: flex; justify-content: space-evenly; align-items: center; margin-bottom: 8px; font-weight: bold; color: #d32f2f; font-size: 12px; background: #fff8e1; padding: 5px 2px; border: 1px solid #333; }
        .summary-box span { color: #0044cc; margin: 0 1px; font-size: 12px; }
        .mobile-table { width: 100%; border-collapse: collapse; text-align: center; table-layout: fixed; }
        .mobile-table th, .mobile-table td { border: 1px solid #333; padding: 3px 0; font-size: 11px; line-height: 1.2; word-break: keep-all; }
        .mobile-table th { background-color: #fff8e1; }
        .mobile-table th:nth-child(1) { width: 14%; } 
        .mobile-table th:nth-child(2) { width: 11%; } 
        .mobile-table th:nth-child(3) { width: 20%; } 
        .mobile-table th:nth-child(4), .mobile-table th:nth-child(5), .mobile-table th:nth-child(6), .mobile-table th:nth-child(7), .mobile-table th:nth-child(8) { width: 11%; } 
        .check-cell { cursor: pointer; color: #0044cc; font-weight: bold; font-size: 15px; user-select: none; background-color: #fafafa; }
        .village-divider { border-bottom: 2px solid #000; }
        .notice { text-align: center; font-size: 10px; color: #666; margin-bottom: 5px; word-break: keep-all; }
    </style>
</head>
<body>
<div class="container">
    <div class="notice">터치하면 실시간 공유됩니다. (주간 단위 관리)</div>
    <div class="header">
        <div class="header-title">2026년 임마누엘 목장 출석부 (목자용)</div>
        <div class="week-label" id="weekRange">데이터 로딩 중...</div>
        <div><input type="date" class="date-input" id="currentDate"></div>
    </div>
    <div class="summary-box">
        <div>주일:<span id="tot-sun">0</span></div><div>화요:<span id="tot-tue">0</span></div>
        <div>수요:<span id="tot-wed">0</span></div><div>금요:<span id="tot-fri">0</span></div>
        <div>마을:<span id="tot-vil">0</span></div>
    </div>
    <table class="mobile-table">
        <thead>
            <tr><th>마을</th><th>직분</th><th>이름</th><th>주일</th><th>화요</th><th>수요</th><th>금요</th><th>마을</th></tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDOfUlA-aQfnNvxTm5X5MkOYPh7JRkAT-w",
        authDomain: "immanuel-attendance.firebaseapp.com",
        databaseURL: "https://immanuel-attendance-default-rtdb.firebaseio.com",
        projectId: "immanuel-attendance",
        storageBucket: "immanuel-attendance.firebasestorage.app",
        messagingSenderId: "1027964994475",
        appId: "1:1027964994475:web:4e21453cc5ce2c11ab48ee"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    let members = []; let attendanceData = {};
    const dateInput = document.getElementById('currentDate');

    function getWeekKey(date) {
        const d = new Date(date); const day = d.getDay();
        const diff = (day >= 2) ? (day - 2) : (day + 5);
        d.setDate(d.getDate() - diff);
        return d.toISOString().split('T')[0];
    }

    dateInput.valueAsDate = new Date();
    dateInput.addEventListener('change', loadData);

    function init() {
        onValue(ref(db, 'members'), (snap) => {
            let loaded = snap.val() || [];
            members = loaded.filter(m => m !== null);
            const vOrder = Array.from({length:20}, (_, i) => `${i+1}.`);
            members.sort((a, b) => {
                const aIdx = vOrder.findIndex(v => a.village.startsWith(v));
                const bIdx = vOrder.findIndex(v => b.village.startsWith(v));
                return aIdx - bIdx;
            });
            renderTable();
        });
        loadData();
    }

    function loadData() {
        const weekKey = getWeekKey(dateInput.value);
        const startDay = new Date(weekKey); const endDay = new Date(startDay);
        endDay.setDate(endDay.getDate() + 5);
        document.getElementById('weekRange').innerText = `${startDay.getMonth()+1}/${startDay.getDate()}(화)~${endDay.getMonth()+1}/${endDay.getDate()}(일) 데이터`;
        onValue(ref(db, `attendance/${weekKey}`), (snap) => { attendanceData = snap.val() || {}; renderTable(); });
    }

    function renderTable() {
        const tbody = document.getElementById('tableBody'); tbody.innerHTML = '';
        let c = { sun: 0, tue: 0, wed: 0, fri: 0, vil: 0 };
        members.forEach((m, idx) => {
            const checks = attendanceData[idx] || {};
            if(checks.sun) c.sun++; if(checks.tue) c.tue++; if(checks.wed) c.wed++; if(checks.fri) c.fri++; if(checks.vil) c.vil++;
            const tr = document.createElement('tr');
            if(idx === members.length - 1 || members[idx+1].village !== m.village) tr.classList.add('village-divider');
            
            let vName = m.village.replace(' 마을', '<br>마을');
            let dName = m.name.includes('(') ? m.name.replace('(', '<br>(') : m.name;

            tr.innerHTML = `<td>${vName}</td><td>${m.role}</td><td>${dName}</td><td class="check-cell" onclick="toggleCheck(${idx}, 'sun')">${checks.sun ? 'O' : ''}</td><td class="check-cell" onclick="toggleCheck(${idx}, 'tue')">${checks.tue ? 'O' : ''}</td><td class="check-cell" onclick="toggleCheck(${idx}, 'wed')">${checks.wed ? 'O' : ''}</td><td class="check-cell" onclick="toggleCheck(${idx}, 'fri')">${checks.fri ? 'O' : ''}</td><td class="check-cell" onclick="toggleCheck(${idx}, 'vil')">${checks.vil ? 'O' : ''}</td>`;
            tbody.appendChild(tr);
        });
        document.getElementById('tot-sun').innerText = c.sun; document.getElementById('tot-tue').innerText = c.tue; document.getElementById('tot-wed').innerText = c.wed; document.getElementById('tot-fri').innerText = c.fri; document.getElementById('tot-vil').innerText = c.vil;
    }

    window.toggleCheck = (idx, day) => {
        const weekKey = getWeekKey(dateInput.value);
        set(ref(db, `attendance/${weekKey}/${idx}/${day}`), !(attendanceData[idx]?.[day] || false));
    };
    init();
</script>
</body>
</html>
