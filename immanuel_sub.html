<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>2026년 임마누엘 목장 출석부 (목자용)</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⛪️</text></svg>">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⛪️</text></svg>">
    
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; margin: 10px; background-color: #f4f4f9; }
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .header { display: flex; flex-direction: column; align-items: center; gap: 8px; border: 2px solid #333; padding: 15px 5px; margin-bottom: 10px; text-align: center; }
        .header-title { font-size: 18px; font-weight: bold; }
        .date-input { font-size: 18px; border: none; outline: none; color: #0044cc; font-weight: bold; font-family: inherit; text-align: center; }
        .week-label { font-size: 12px; color: #666; margin-bottom: 5px; font-weight: bold; }
        .summary-box { display: flex; justify-content: space-evenly; align-items: center; margin-bottom: 15px; font-weight: bold; color: #d32f2f; font-size: 13px; background: #fff8e1; padding: 10px 2px; border: 1px solid #333; letter-spacing: -0.5px; flex-wrap: wrap; gap: 5px; }
        .summary-box div { white-space: nowrap; }
        .summary-box span { color: #0044cc; margin: 0 2px; font-size: 14px; }
        table { width: 100%; border-collapse: collapse; text-align: center; table-layout: fixed; }
        th, td { border: 1px solid #333; padding: 8px 1px; font-size: 11px; }
        th { background-color: #fff8e1; word-break: keep-all; }
        th:nth-child(1) { width: 16%; } th:nth-child(2) { width: 14%; } th:nth-child(3) { width: 20%; } 
        th:nth-child(4), th:nth-child(5), th:nth-child(6), th:nth-child(7), th:nth-child(8) { width: 10%; } 
        .check-cell { cursor: pointer; color: #0044cc; font-weight: bold; font-size: 15px; user-select: none; }
        .village-divider { border-bottom: 2px solid #000; }
        .notice { text-align: center; font-size: 12px; color: #666; margin-bottom: 10px; word-break: keep-all; }
    </style>
</head>
<body>
<div class="container">
    <div class="notice">터치하면 출석이 체크되며, 주간 데이터(화~일)로 관리됩니다.</div>
    <div class="header">
        <div class="header-title">2026년 임마누엘 목장 출석부 (목자용)</div>
        <div class="week-label" id="weekRange">데이터 로딩 중...</div>
        <div><input type="date" class="date-input" id="currentDate"></div>
    </div>
    <div class="summary-box">
        <div>주일:<span id="tot-sun">0</span></div><div>화요:<span id="tot-tue">0</span></div>
        <div>수요:<span id="tot-wed">0</span></div><div>금요:<span id="tot-fri">0</span></div>
        <div>마을:<span id="tot-vil">0</span></div>
    </div>
    <table>
        <thead>
            <tr><th>마을</th><th>직분</th><th>이름</th><th>주일</th><th>화요</th><th>수요</th><th>금요</th><th>마을</th></tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getDatabase, ref, onValue, set, get } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDOfUlA-aQfnNvxTm5X5MkOYPh7JRkAT-w",
        authDomain: "immanuel-attendance.firebaseapp.com",
        databaseURL: "https://immanuel-attendance-default-rtdb.firebaseio.com",
        projectId: "immanuel-attendance",
        storageBucket: "immanuel-attendance.firebasestorage.app",
        messagingSenderId: "1027964994475",
        appId: "1:1027964994475:web:4e21453cc5ce2c11ab48ee"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    let members = []; let attendanceData = {};
    const dateInput = document.getElementById('currentDate');

    function getWeekKey(date) {
        const d = new Date(date); const day = d.getDay();
        const diff = (day >= 2) ? (day - 2) : (day + 5);
        d.setDate(d.getDate() - diff);
        return d.toISOString().split('T')[0];
    }

    dateInput.valueAsDate = new Date();
    dateInput.addEventListener('change', loadData);

    const rawData = `1. 섬김 마을	목자	신금옥\n1. 섬김 마을	순장	박정아\n1. 섬김 마을		구점례\n1. 섬김 마을		김옥녀\n1. 섬김 마을		김미애\n1. 섬김 마을	순장	고영임\n1. 섬김 마을		박금순\n1. 섬김 마을		신정자\n2. 사랑스런 마을	목자	문이정\n2. 사랑스런 마을		강애정\n2. 사랑스런 마을		김희\n2. 사랑스런 마을		전숙련\n2. 사랑스런 마을		고옥희\n2. 사랑스런 마을		김정아\n2. 사랑스런 마을		김성자\n2. 사랑스런 마을		장순애\n2. 사랑스런 마을		민윤임\n3. 워십 마을	목자	주일심\n3. 워십 마을	순장	강변형\n3. 워십 마을	순장	고경미\n3. 워십 마을		고유은\n3. 워십 마을		김선화\n3. 워십 마을		권경희\n4. 양떼 마을	목자	이윤희\n4. 양떼 마을		김명자\n4. 양떼 마을		허옥자\n4. 양떼 마을	순장	김영희\n4. 양떼 마을		박영희\n4. 양떼 마을		김애숙\n5. 은혜 마을	목자	신하영\n5. 은혜 마을		박영순\n5. 은혜 마을		윤서연\n6. 포도원 마을	목자	임수자\n6. 포도원 마을	순장	박경자\n6. 포도원 마을		서경자\n6. 포도원 마을	순장	신순희\n7. 회복 마을	목자	서금희\n8. 새생명 마을	목자	김연희\n8. 새생명 마을	순장	정선명\n8. 새생명 마을		남진숙\n9. 청솔 마을	목자	서연화\n9. 청솔 마을	순장	최경자\n9. 청솔 마을		한채화\n9. 청솔 마을	순장	진선양\n10. 풍성한 마을	목자	염상남\n10. 풍성한 마을	순장	천경희\n10. 풍성한 마을		신수진\n10. 풍성한 마을		최순례\n10. 풍성한 마을		이명자\n10. 풍성한 마을		이진자\n10. 풍성한 마을		김은미\n10. 풍성한 마을	순장	송남숙\n10. 풍성한 마을		김영순\n10. 풍성한 마을		송동순\n10. 풍성한 마을		김가연\n10. 풍성한 마을		최숙자\n10. 풍성한 마을		박명덕\n10. 풍성한 마을		이태남\n10. 풍성한 마을		박채정\n10. 풍성한 마을		오선명\n11. 상속자 마을	목자	최원래\n11. 상속자 마을		박현미\n12. 보배 마을	목자	김철례\n12. 보배 마을		전덕례\n12. 보배 마을		안순자\n12. 보배 마을		안옥심\n12. 보배 마을		이갑주\n13. 순종 마을	목자	김인숙\n13. 순종 마을	순장	이영숙\n13. 순종 마을		박경이\n13. 순종 마을		이근엽\n13. 순종 마을		고채연\n13. 순종 마을		정미영\n13. 순종 마을		기연자\n13. 순종 마을		최진숙\n14. 반석 마을	목자	임영자\n14. 반석 마을	순장	백순금\n14. 반석 마을		전혜란\n14. 반석 마을		조명자\n14. 반석 마을		이명복\n14. 반석 마을		채영순\n14. 반석 마을		이정오\n14. 반석 마을		강남옥\n14. 반석 마을		김경자\n14. 반석 마을		신인심\n14. 반석 마을		김윤경\n14. 반석 마을		박학순\n14. 반석 마을		김옥경\n14. 반석 마을		김은순\n14. 반석 마을		김현주\n14. 반석 마을		정명순\n15. 지성소 마을	목자	김미현\n15. 지성소 마을		김일순\n15. 지성소 마을		최순남\n16. 번성 마을	목자	이태란\n16. 번성 마을		박미나\n16. 번성 마을		장광희\n16. 번성 마을		안진선\n16. 번성 마을		김은미\n16. 번성 마을		황희\n17. 권능 마을	목자	임혜선\n17. 권능 마을	순장	한승진\n17. 권능 마을		박미순\n17. 권능 마을		윤경숙\n17. 권능 마을		김소영\n17. 권능 마을		김옥심\n18. 열매맺는 마을	목자	윤은순\n18. 열매맺는 마을	순장	전예영\n18. 열매맺는 마을		유봉은\n18. 열매맺는 마을		박미영\n18. 열매맺는 마을		양순금\n18. 열매맺는 마을		이시연\n19. 온유 마을	목자	기영란\n19. 온유 마을		손장엽\n20. 승리 마을	목자	김비영\n20. 승리 마을		박승혜`;

    async function init() {
        const mRef = ref(db, 'members');
        const snap = await get(mRef);
        if(!snap.exists()) {
            const initial = rawData.split('\n').map(l => { const [v, r, n] = l.split('\t'); return { village: v.trim(), role: r ? r.trim() : "", name: n.trim() }; });
            await set(mRef, initial);
        }
        onValue(mRef, (s) => {
            let loaded = s.val() || [];
            members = loaded.filter(m => m !== null);
            const vOrder = Array.from({length:20}, (_, i) => `${i+1}.`);
            members.sort((a, b) => {
                const aIdx = vOrder.findIndex(v => a.village.startsWith(v));
                const bIdx = vOrder.findIndex(v => b.village.startsWith(v));
                return aIdx - bIdx;
            });
            renderTable();
        });
        loadData();
    }

    function loadData() {
        const weekKey = getWeekKey(dateInput.value);
        const startDay = new Date(weekKey); const endDay = new Date(startDay);
        endDay.setDate(endDay.getDate() + 5);
        document.getElementById('weekRange').innerText = `${startDay.getMonth()+1}/${startDay.getDate()}(화) ~ ${endDay.getMonth()+1}/${endDay.getDate()}(일) 데이터`;
        onValue(ref(db, `attendance/${weekKey}`), (snap) => { attendanceData = snap.val() || {}; renderTable(); });
    }

    function renderTable() {
        const tbody = document.getElementById('tableBody'); tbody.innerHTML = '';
        let c = { sun: 0, tue: 0, wed: 0, fri: 0, vil: 0 };
        members.forEach((m, idx) => {
            const checks = attendanceData[idx] || {};
            if(checks.sun) c.sun++; if(checks.tue) c.tue++; if(checks.wed) c.wed++; if(checks.fri) c.fri++; if(checks.vil) c.vil++;
            const tr = document.createElement('tr');
            if(idx === members.length - 1 || members[idx+1].village !== m.village) tr.classList.add('village-divider');
            let dName = m.name.includes('(') ? m.name.replace('(', '<br>(') : m.name;
            tr.innerHTML = `<td>${m.village}</td><td>${m.role}</td><td>${dName}</td><td class="check-cell" onclick="toggleCheck(${idx}, 'sun')">${checks.sun ? 'O' : ''}</td><td class="check-cell" onclick="toggleCheck(${idx}, 'tue')">${checks.tue ? 'O' : ''}</td><td class="check-cell" onclick="toggleCheck(${idx}, 'wed')">${checks.wed ? 'O' : ''}</td><td class="check-cell" onclick="toggleCheck(${idx}, 'fri')">${checks.fri ? 'O' : ''}</td><td class="check-cell" onclick="toggleCheck(${idx}, 'vil')">${checks.vil ? 'O' : ''}</td>`;
            tbody.appendChild(tr);
        });
        document.getElementById('tot-sun').innerText = c.sun; document.getElementById('tot-tue').innerText = c.tue; document.getElementById('tot-wed').innerText = c.wed; document.getElementById('tot-fri').innerText = c.fri; document.getElementById('tot-vil').innerText = c.vil;
    }

    window.toggleCheck = (idx, day) => {
        const weekKey = getWeekKey(dateInput.value);
        const next = !(attendanceData[idx]?.[day] || false);
        set(ref(db, `attendance/${weekKey}/${idx}/${day}`), next);
    };

    init();
</script>
</body>
</html>
