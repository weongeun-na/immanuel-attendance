<html lang="ko">
<head>

    <title>2026년 임마누엘 목장 출석부 (관리자)</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        body { font-family: 'Malgun Gothic', sans-serif; margin: 0; padding: 5px; background-color: #f4f4f9; -webkit-tap-highlight-color: transparent; }
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 5px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .header { display: flex; flex-direction: column; align-items: center; border: 2px solid #333; padding: 10px 5px; margin-bottom: 5px; text-align: center; position: relative; }
        .header-title { font-size: 16px; font-weight: bold; }
        .date-input { font-size: 16px; border: none; outline: none; color: #0044cc; font-weight: bold; text-align: center; background: transparent; }
        .week-label { font-size: 11px; color: #666; font-weight: bold; margin-top: 3px; }
        .btn-settings { position: absolute; right: 5px; top: 10px; background: #333; color: white; border: none; border-radius: 4px; padding: 5px 8px; font-size: 10px; cursor: pointer; }
        
        .summary-box { display: flex; justify-content: space-evenly; align-items: center; margin-bottom: 8px; font-weight: bold; color: #d32f2f; font-size: 12px; background: #fff8e1; padding: 5px 2px; border: 1px solid #333; }
        .summary-box span { color: #0044cc; margin: 0 1px; font-size: 12px; }

        .mobile-table { width: 100%; border-collapse: collapse; text-align: center; table-layout: fixed; }
        .mobile-table th, .mobile-table td { border: 1px solid #333; padding: 4px 0; font-size: 11px; line-height: 1.3; word-break: keep-all; }
        .mobile-table th { background-color: #fff8e1; }
        
        /* 💡 레이아웃: 마을열 제거 (총 8열) */
        .mobile-table th:nth-child(1) { width: 10%; } /* 직분 */
        .mobile-table th:nth-child(2) { width: 20%; } /* 이름 */
        .mobile-table th:nth-child(3), .mobile-table th:nth-child(4), .mobile-table th:nth-child(5), .mobile-table th:nth-child(6), .mobile-table th:nth-child(7) { width: 11%; } /* 체크 5개 */
        .mobile-table th:nth-child(8) { width: 15%; } /* 관리 */
        
        .village-header { background-color: #c8e6c9 !important; font-weight: bold; text-align: left; padding-left: 10px !important; font-size: 12px; letter-spacing: 1px; }
        .check-cell { cursor: pointer; font-weight: bold; font-size: 14px; user-select: none; background-color: #fafafa; }
        .check-cell:active { background-color: #e3f2fd; }
        
        .admin-btn { padding: 8px 12px; margin: 3px; cursor: pointer; border: none; border-radius: 5px; color: white; font-weight: bold; font-size: 12px; }
        .btn-img { background-color: #4CAF50; } .btn-pdf { background-color: #d32f2f; }
        .btn-add { background-color: #1976D2; width: 100%; margin-top: 10px; padding: 12px; font-size: 15px; }
        .btn-manage { background-color: #424242; padding: 4px 6px; font-size: 10px; color: white; border-radius: 3px; border: none; cursor: pointer; }

        /* 공통 모달 스타일 */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 20px; border-radius: 10px; width: 90%; max-width: 350px; box-sizing: border-box; }
        .modal-content h3 { margin-top: 0; color: #1976D2; border-bottom: 2px solid #1976D2; padding-bottom: 10px; text-align: center; }
        .modal-content label { display: block; margin: 10px 0 5px; font-weight: bold; font-size: 12px; }
        .modal-content select, .modal-content input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-size: 14px; }
        .modal-btns { display: flex; gap: 8px; margin-top: 20px; }
        .modal-btns button { flex: 1; padding: 12px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 14px; }
        
        /* 출석 체크 옵션 버튼 */
        .opt-btn { padding: 10px 15px; background: #e0e0e0; border: none; border-radius: 5px; font-weight: bold; margin: 5px; cursor: pointer; font-size: 14px; }
        .opt-btn-primary { background: #1976D2; color: white; }
    </style>
</head>
