<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>2026년 임마누엘 목장 출석부 (관리자)</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><path fill=%22%23800000%22 d=%22M15 45L50 15L85 45V90H15V45Z M45 45V28H55V45H45Z M45 70V80H55V70H45Z%22/></svg>">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; margin: 0; padding: 5px; background-color: #f4f4f9; }
        #mobile-view { max-width: 900px; margin: 0 auto; background: white; padding: 5px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .header { display: flex; flex-direction: column; align-items: center; border: 2px solid #333; padding: 10px 5px; margin-bottom: 5px; text-align: center; }
        .header-title { font-size: 16px; font-weight: bold; }
        .date-input { font-size: 16px; border: none; outline: none; color: #0044cc; font-weight: bold; text-align: center; cursor: pointer; }
        .week-label { font-size: 11px; color: #666; font-weight: bold; }
        .summary-box { display: flex; justify-content: space-evenly; align-items: center; margin-bottom: 8px; font-weight: bold; color: #d32f2f; font-size: 12px; background: #fff8e1; padding: 5px 2px; border: 1px solid #333; }
        .summary-box span { color: #0044cc; margin: 0 1px; font-size: 12px; }
        .mobile-table { width: 100%; border-collapse: collapse; text-align: center; table-layout: fixed; }
        .mobile-table th, .mobile-table td { border: 1px solid #333; padding: 4px 0; font-size: 11px; line-height: 1.2; }
        .mobile-table th { background-color: #fff8e1; }
        .mobile-table th:nth-child(1) { width: 20%; } .mobile-table th:nth-child(2) { width: 10%; } .mobile-table th:nth-child(3) { width: 13%; } 
        .mobile-table th:nth-child(4), .mobile-table th:nth-child(5), .mobile-table th:nth-child(6), .mobile-table th:nth-child(7), .mobile-table th:nth-child(8) { width: 9.5%; } 
        .mobile-table th:nth-child(9) { width: 9.5%; } 
        .check-cell { cursor: pointer; color: #0044cc; font-weight: bold; font-size: 16px; user-select: none; background-color: #fafafa; }
        .village-divider { border-bottom: 2px solid #000; }
        .admin-btn { padding: 8px 12px; margin: 3px; cursor: pointer; border: none; border-radius: 5px; color: white; font-weight: bold; font-size: 12px; }
        .btn-img { background-color: #4CAF50; } .btn-pdf { background-color: #d32f2f; }
        .btn-add { background-color: #1976D2; width: 100%; margin-top: 10px; padding: 12px; font-size: 15px; }
        .btn-del { background-color: #ff9800; padding: 2px 4px; font-size: 10px; color: white; border-radius: 3px; border: none; }
        #add-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 20px; border-radius: 10px; width: 90%; max-width: 400px; }
        .modal-content select, .modal-content input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; font-size: 16px; }
        .modal-btns { display: flex; gap: 10px; } .modal-btns button { flex: 1; padding: 12px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div style="text-align: center; margin-bottom: 5px;">
    <button class="admin-btn btn-img" id="imgBtn">🖼️ 이미지 저장</button>
    <button class="admin-btn btn-pdf" id="pdfBtn">📄 PDF 저장</button>
</div>

<div id="mobile-view">
    <div class="header">
        <div class="header-title">2026년 임마누엘 목장 출석부 (관리자)</div>
        <div class="week-label" id="weekRange">데이터 로딩 중...</div>
        <div><input type="date" class="date-input" id="currentDate"></div>
    </div>
    <div class="summary-box">
        <div>주일:<span id="tot-sun">0</span></div><div>화요:<span id="tot-tue">0</span></div>
        <div>수요:<span id="tot-wed">0</span></div><div>금요:<span id="tot-fri">0</span></div>
        <div>마을:<span id="tot-vil">0</span></div>
    </div>
    <table class="mobile-table">
        <thead><tr><th>마을</th><th>직분</th><th>이름</th><th>주일</th><th>화요</th><th>수요</th><th>금요</th><th>마을</th><th>관리</th></tr></thead>
        <tbody id="mobileBody"></tbody>
    </table>
    <button class="admin-btn btn-add" id="addBtn">+ 새 인원 추가</button>
</div>

<div id="add-modal">
    <div class="modal-content">
        <label>마을 선택</label>
        <select id="modal-village">
            <option value="1. 섬김 마을">1. 섬김 마을</option><option value="2. 사랑스런 마을">2. 사랑스런 마을</option><option value="3. 워십 마을">3. 워십 마을</option><option value="4. 양떼 마을">4. 양떼 마을</option><option value="5. 은혜 마을">5. 은혜 마을</option><option value="6. 포도원 마을">6. 포도원 마을</option><option value="7. 회복 마을">7. 회복 마을</option><option value="8. 새생명 마을">8. 새생명 마을</option><option value="9. 청솔 마을">9. 청솔 마을</option><option value="10. 풍성한 마을">10. 풍성한 마을</option><option value="11. 상속자 마을">11. 상속자 마을</option><option value="12. 보배 마을">12. 보배 마을</option><option value="13. 순종 마을">13. 순종 마을</option><option value="14. 반석 마을">14. 반석 마을</option><option value="15. 지성소 마을">15. 지성소 마을</option><option value="16. 번성 마을">16. 번성 마을</option><option value="17. 권능 마을">17. 권능 마을</option><option value="18. 열매맺는 마을">18. 열매맺는 마을</option><option value="19. 온유 마을">19. 온유 마을</option><option value="20. 승리 마을">20. 승리 마을</option>
        </select>
        <label>직분</label><input type="text" id="modal-role" placeholder="예: 목자">
        <label>이름</label><input type="text" id="modal-name" placeholder="성함">
        <div class="modal-btns">
            <button style="background:#999; color:white;" id="modal-cancel">취소</button>
            <button style="background:#1976D2; color:white;" id="modal-save">저장</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDOfUlA-aQfnNvxTm5X5MkOYPh7JRkAT-w",
        authDomain: "immanuel-attendance.firebaseapp.com",
        databaseURL: "https://immanuel-attendance-default-rtdb.firebaseio.com",
        projectId: "immanuel-attendance",
        storageBucket: "immanuel-attendance.firebasestorage.app",
        messagingSenderId: "1027964994475",
        appId: "1:1027964994475:web:4e21453cc5ce2c11ab48ee"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    let members = []; let attendanceData = {};
    const dateInput = document.getElementById('currentDate');

    // 💡 소리 엔진 개선
    let audioCtx;
    function playSound(isCheck) {
        try {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume(); // 👈 여기서 차단 해제
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.type = 'sine';
            osc.frequency.setValueAtTime(isCheck ? 880 : 440, audioCtx.currentTime); // 체크시 고음, 해제시 저음
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
            osc.start(); osc.stop(audioCtx.currentTime + 0.15);
        } catch(e) { console.error(e); }
    }

    function getWeekKey(date) {
        const d = new Date(date); const day = d.getDay();
        const diff = (day >= 2) ? (day - 2) : (day + 5);
        d.setDate(d.getDate() - diff);
        return d.toISOString().split('T')[0];
    }

    dateInput.valueAsDate = new Date();
    dateInput.addEventListener('change', loadData);

    async function init() {
        onValue(ref(db, 'members'), (snap) => {
            members = (snap.val() || []).filter(m => m !== null);
            const vOrder = Array.from({length:20}, (_, i) => `${i+1}.`);
            members.sort((a, b) => vOrder.findIndex(v => a.village.startsWith(v)) - vOrder.findIndex(v => b.village.startsWith(v)));
            renderTable();
        });
        loadData();
    }

    function loadData() {
        const weekKey = getWeekKey(dateInput.value);
        const startDay = new Date(weekKey);
        document.getElementById('weekRange').innerText = `${startDay.getMonth()+1}/${startDay.getDate()}(화) 시작 주간`;
        onValue(ref(db, `attendance/${weekKey}`), (snap) => { attendanceData = snap.val() || {}; renderTable(); });
    }

    function renderTable() {
        const tbodyMobile = document.getElementById('mobileBody'); tbodyMobile.innerHTML = '';
        let c = { sun: 0, tue: 0, wed: 0, fri: 0, vil: 0 };
        members.forEach((m, idx) => {
            const checks = attendanceData[idx] || {};
            if(checks.sun) c.sun++; if(checks.tue) c.tue++; if(checks.wed) c.wed++; if(checks.fri) c.fri++; if(checks.vil) c.vil++;
            const tr = document.createElement('tr');
            if(idx === members.length - 1 || members[idx+1].village !== m.village) tr.classList.add('village-divider');
            let dName = m.name.includes('(') ? m.name.replace('(', '<br>(') : m.name;
            tr.innerHTML = `<td>${m.village}</td><td>${m.role}</td><td>${dName}</td><td class="check-cell" onclick="toggleCheck(${idx}, 'sun')">${checks.sun ? 'O' : ''}</td><td class="check-cell" onclick="toggleCheck(${idx}, 'tue')">${checks.tue ? 'O' : ''}</td><td class="check-cell" onclick="toggleCheck(${idx}, 'wed')">${checks.wed ? 'O' : ''}</td><td class="check-cell" onclick="toggleCheck(${idx}, 'fri')">${checks.fri ? 'O' : ''}</td><td class="check-cell" onclick="toggleCheck(${idx}, 'vil')">${checks.vil ? 'O' : ''}</td><td><button class="btn-del" onclick="deleteMember(${idx})">삭제</button></td>`;
            tbodyMobile.appendChild(tr);
        });
        document.getElementById('tot-sun').innerText = c.sun; document.getElementById('tot-tue').innerText = c.tue; document.getElementById('tot-wed').innerText = c.wed; document.getElementById('tot-fri').innerText = c.fri; document.getElementById('tot-vil').innerText = c.vil;
    }

    window.toggleCheck = (idx, day) => {
        const weekKey = getWeekKey(dateInput.value);
        const next = !(attendanceData[idx]?.[day] || false);
        set(ref(db, `attendance/${weekKey}/${idx}/${day}`), next);
        playSound(next); // 👈 소리 실행
    };

    window.deleteMember = (idx) => { if(confirm("정말 삭제하시겠습니까?")) set(ref(db, 'members'), members.filter((_, i) => i !== idx)); };
    const modal = document.getElementById('add-modal');
    document.getElementById('addBtn').onclick = () => { modal.style.display = 'flex'; };
    document.getElementById('modal-cancel').onclick = () => { modal.style.display = 'none'; };
    document.getElementById('modal-save').onclick = () => {
        const v = document.getElementById('modal-village').value, r = document.getElementById('modal-role').value, n = document.getElementById('modal-name').value;
        if(n) { members.push({ village: v, role: r, name: n }); set(ref(db, 'members'), members); modal.style.display = 'none'; }
    };
    init();
</script>
</body>
</html>
