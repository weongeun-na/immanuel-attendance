<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>2026년 임마누엘 목장 출석부 (관리자)</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><path fill=%22%23800000%22 d=%22M15 45L50 15L85 45V90H15V45Z M45 45V28H55V45H45Z M45 70V80H55V70H45Z%22/></svg>">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><path fill=%22%23800000%22 d=%22M15 45L50 15L85 45V90H15V45Z M45 45V28H55V45H45Z M45 70V80H55V70H45Z%22/></svg>">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; margin: 10px; background-color: #f4f4f9; }
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .header { display: flex; flex-direction: column; align-items: center; gap: 8px; border: 2px solid #333; padding: 15px 5px; margin-bottom: 10px; text-align: center; }
        .header-title { font-size: 18px; font-weight: bold; }
        .date-input { font-size: 18px; border: none; outline: none; color: #0044cc; font-weight: bold; font-family: inherit; text-align: center; }
        
        .summary-box { display: flex; justify-content: space-evenly; align-items: center; margin-bottom: 15px; font-weight: bold; color: #d32f2f; font-size: 13px; background: #fff8e1; padding: 10px 2px; border: 1px solid #333; letter-spacing: -0.5px; }
        .summary-box div { white-space: nowrap; }
        .summary-box span { color: #0044cc; margin: 0 2px; font-size: 14px; }

        .table-wrapper { display: flex; flex-direction: column; gap: 15px; }
        .split-table { width: 100%; border-collapse: collapse; text-align: center; table-layout: fixed; }
        
        th, td { border: 1px solid #333; padding: 8px 2px; font-size: 12px; }
        th { background-color: #fff8e1; word-break: keep-all; }
        th:nth-child(1), th:nth-child(2) { width: 12%; } 
        th:nth-child(3) { width: 22%; } 
        th:nth-child(4), th:nth-child(5), th:nth-child(6), th:nth-child(7) { width: 10%; } 
        th:nth-child(8) { width: 14%; } 
        
        .check-cell { cursor: pointer; color: #0044cc; font-weight: bold; font-size: 16px; user-select: none; }
        .check-cell:hover { background-color: #e3f2fd; }
        .village-divider { border-bottom: 2px solid #000; }
        .admin-btn { padding: 8px 15px; margin: 5px; cursor: pointer; border: none; border-radius: 5px; color: white; font-weight: bold; }
        .btn-img { background-color: #4CAF50; }
        .btn-pdf { background-color: #d32f2f; }
        .btn-add { background-color: #1976D2; width: 100%; margin-top: 10px; padding: 12px; font-size: 16px; }
        .btn-del { background-color: #ff9800; padding: 4px 6px; font-size: 11px; cursor: pointer; }
        .hide-on-print { display: table-cell; }

        .export-mode { width: 850px !important; max-width: none !important; padding: 20px !important; }
        .export-mode .table-wrapper { flex-direction: row; align-items: flex-start; }
        .export-mode .split-table { width: 50%; }
        .export-mode th, .export-mode td { padding: 4px 1px !important; font-size: 11px !important; }
    </style>
</head>
<body>

<div style="text-align: center; margin-bottom: 10px;">
    <button class="admin-btn btn-img" id="imgBtn">🖼️ 이미지 저장</button>
    <button class="admin-btn btn-pdf" id="pdfBtn">📄 PDF 저장</button>
</div>

<div class="container" id="capture-area">
    <div class="header">
        <div class="header-title" id="mainTitle">2026년 임마누엘 목장 출석부 (관리자)</div>
        <div><input type="date" class="date-input" id="currentDate"></div>
    </div>

    <div class="summary-box">
        <div>수요:<span id="tot-wed">0</span>명</div>
        <div>금요:<span id="tot-fri">0</span>명</div>
        <div>주일:<span id="tot-sun">0</span>명</div>
        <div>마을:<span id="tot-vil">0</span>명</div>
    </div>

    <div class="table-wrapper" id="table-wrapper">
        <table class="split-table">
            <thead>
                <tr>
                    <th>마을</th><th>직분</th><th>이름</th><th>수요</th><th>금요</th><th>주일</th><th>마을</th><th class="hide-on-print action-col">관리</th>
                </tr>
            </thead>
            <tbody id="tbody-left"></tbody>
        </table>

        <table class="split-table">
            <thead>
                <tr>
                    <th>마을</th><th>직분</th><th>이름</th><th>수요</th><th>금요</th><th>주일</th><th>마을</th><th class="hide-on-print action-col">관리</th>
                </tr>
            </thead>
            <tbody id="tbody-right"></tbody>
        </table>
    </div>
    
    <button class="admin-btn btn-add hide-on-print" id="addBtn">+ 새 인원 추가</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    // get 기능 추가
    import { getDatabase, ref, onValue, set, get } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDOfUlA-aQfnNvxTm5X5MkOYPh7JRkAT-w",
        authDomain: "immanuel-attendance.firebaseapp.com",
        databaseURL: "https://immanuel-attendance-default-rtdb.firebaseio.com",
        projectId: "immanuel-attendance",
        storageBucket: "immanuel-attendance.firebasestorage.app",
        messagingSenderId: "1027964994475",
        appId: "1:1027964994475:web:4e21453cc5ce2c11ab48ee"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let members = [];
    let attendanceData = {};
    const dateInput = document.getElementById('currentDate');
    
    dateInput.valueAsDate = new Date();
    dateInput.addEventListener('change', loadData);

    const villageOrder = ['열매', '믿음', '소망', '축복', '온유', '만배', '생명수', '갈렙', '약속'];
    const leftVillages = ['열매', '믿음', '소망', '축복'];

    // 빈 창고를 채워줄 원본 데이터
    const rawData = `열매	목자	정경채(박현정)\n열매		임충열(이영숙)\n열매		권성현(백수정)\n열매		최병일(허미영)\n열매		황주상(이진형)\n열매		이주원(임지혜)\n열매		김귀송(권정아)\n열매		정대범(오서윤)\n열매		조상기(김혜연)\n열매		신재환\n믿음	목자	김영일(정정인)\n믿음	순장	배주석<br>(김 경)\n믿음		최갑수(고현진)\n믿음		곽웅비(김수진)\n믿음		조예닮(주예슬)\n소망	목자	이경훈(박연희)\n소망		이동일(신순자)\n소망		정용균(문미정)\n소망		최민호(박미순)\n소망		김영도(진보람)\n소망		방용지(주현영)\n소망		이동섭\n축복	목자	김동원(김미라)\n축복		김환모(김혜영)\n축복		이성철\n축복		박영곤\n온유	목자	조승구(박금이)\n온유		이도현(윤미영)\n온유		문종호(조혜숙)\n온유		오태현<br>(김 민)\n온유		박인호(김미경)\n온유		김경석(박정미)\n만배	목자	나원근(이혜련)\n만배		조봉현(이윤희)\n만배		최 욱<br>(김혜정)\n만배		안영섭(윤숙자)\n만배		정우진(박선아)\n생명수	목자	임수열(김윤경)\n생명수	순장	이성진(고윤정)\n생명수		김병헌(임혜선)\n생명수		임알렉산더\n생명수		전홍석(강호연)\n생명수		김선웅\n생명수		조영환(이혜진)\n생명수		이재익\n생명수		김장기\n갈렙	목자	선종식(이정례)\n갈렙		김재봉(서금희)\n갈렙		정용국(손정림)\n약속	목자	황민우(고유은)\n약속	순장	고대봉(허태현)\n약속		김산웅(고경미)\n약속		이동혁(이재영)`;

    let audioCtx;
    function playSound(isCheck) {
        try {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = 'sine';
            osc.frequency.setValueAtTime(isCheck ? 880 : 440, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.start(audioCtx.currentTime);
            osc.stop(audioCtx.currentTime + 0.1);
            setTimeout(() => { osc.disconnect(); gain.disconnect(); }, 200);
        } catch(e) {}
    }

    // async 추가
    async function init() {
        const membersRef = ref(db, 'members');
        
        // 데이터가 없으면 처음 한 번 자동으로 채워주는 마법 코드
        const snapshot = await get(membersRef);
        if (!snapshot.exists()) {
            const initialMembers = rawData.split('\n').map(line => {
                const [v, r, n] = line.split('\t');
                return { village: v.trim(), role: r ? r.trim() : "", name: n.trim() };
            });
            await set(membersRef, initialMembers);
        }

        onValue(membersRef, (snap) => {
            let loadedMembers = snap.val() || [];
            loadedMembers = loadedMembers.filter(m => m !== null && m !== undefined);
            let needsFix = false;
            loadedMembers.forEach(m => {
                if (m.village === '반배') { m.village = '만배'; needsFix = true; }
            });
            if (needsFix) set(ref(db, 'members'), loadedMembers);

            members = loadedMembers.sort((a, b) => {
                let aIndex = villageOrder.indexOf(a.village);
                let bIndex = villageOrder.indexOf(b.village);
                if (aIndex === -1) aIndex = 99;
                if (bIndex === -1) bIndex = 99;
                return aIndex - bIndex;
            });
            renderTable();
        });
        loadData();
    }

    function loadData() {
        const dateStr = dateInput.value;
        onValue(ref(db, `attendance/${dateStr}`), (snap) => {
            attendanceData = snap.val() || {};
            renderTable();
        });
    }

    function renderTable() {
        const tbodyLeft = document.getElementById('tbody-left');
        const tbodyRight = document.getElementById('tbody-right');
        tbodyLeft.innerHTML = ''; tbodyRight.innerHTML = '';
        
        let wedCount = 0, friCount = 0, sunCount = 0, vilCount = 0;

        members.forEach((m, idx) => {
            if(!m) return;
            const checks = attendanceData[idx] || {};
            if(checks.wed) wedCount++;
            if(checks.fri) friCount++;
            if(checks.sun) sunCount++;
            if(checks.vil) vilCount++;

            const tr = document.createElement('tr');
            const isLastInVillage = (idx === members.length - 1) || (members[idx+1].village !== m.village);
            if(isLastInVillage) tr.classList.add('village-divider');
            
            let displayName = m.name;
            if (displayName.includes('(') && !displayName.includes('<br>')) {
                displayName = displayName.replace('(', '<br>(');
            }
            
            tr.innerHTML = `
                <td>${m.village}</td><td>${m.role}</td><td>${displayName}</td>
                <td class="check-cell" onclick="toggleCheck(${idx}, 'wed')">${checks.wed ? 'O' : ''}</td>
                <td class="check-cell" onclick="toggleCheck(${idx}, 'fri')">${checks.fri ? 'O' : ''}</td>
                <td class="check-cell" onclick="toggleCheck(${idx}, 'sun')">${checks.sun ? 'O' : ''}</td>
                <td class="check-cell" onclick="toggleCheck(${idx}, 'vil')">${checks.vil ? 'O' : ''}</td>
                <td class="hide-on-print action-col"><button class="admin-btn btn-del" onclick="deleteMember(${idx})">삭제</button></td>
            `;
            
            if (leftVillages.includes(m.village)) {
                tbodyLeft.appendChild(tr);
            } else {
                tbodyRight.appendChild(tr);
            }
        });
        
        document.getElementById('tot-wed').innerText = wedCount;
        document.getElementById('tot-fri').innerText = friCount;
        document.getElementById('tot-sun').innerText = sunCount;
        document.getElementById('tot-vil').innerText = vilCount;
    }

    window.toggleCheck = (idx, day) => {
        const dateStr = dateInput.value;
        const current = attendanceData[idx]?.[day] || false;
        const nextState = !current;
        set(ref(db, `attendance/${dateStr}/${idx}/${day}`), nextState);
        playSound(nextState);
    };

    window.deleteMember = (idx) => {
        const cleanName = members[idx].name.replace('<br>', '');
        if(confirm(`[${cleanName}] 성도님을 명단에서 삭제하시겠습니까?`)) {
            members.splice(idx, 1);
            const newMembers = members.filter(m => m !== null && m !== undefined);
            set(ref(db, 'members'), newMembers);
        }
    };

    document.getElementById('addBtn').addEventListener('click', () => {
        const v = prompt("마을 이름을 입력하세요 (예: 만배)");
        const r = prompt("직분을 입력하세요 (없으면 빈칸)");
        const n = prompt("이름을 입력하세요 (예: 홍길동(가족))");
        if(v && n) {
            members.push({ village: v, role: r, name: n });
            set(ref(db, 'members'), members);
        }
    });

    function prepareCapture() {
        const elems = document.querySelectorAll('.hide-on-print');
        elems.forEach(el => el.style.display = 'none');
        
        const area = document.getElementById('capture-area');
        const titleEl = document.getElementById('mainTitle');
        titleEl.innerText = '2026년 임마누엘 목장 출석부'; 
        area.classList.add('export-mode'); 
    }

    function revertCapture() {
        const elems = document.querySelectorAll('.hide-on-print');
        elems.forEach(el => el.style.display = '');
        
        const area = document.getElementById('capture-area');
        const titleEl = document.getElementById('mainTitle');
        titleEl.innerText = '2026년 임마누엘 목장 출석부 (관리자)';
        area.classList.remove('export-mode'); 
    }

    document.getElementById('imgBtn').addEventListener('click', () => {
        prepareCapture();
        setTimeout(() => { 
            html2canvas(document.getElementById('capture-area'), {scale: 2}).then(canvas => {
                const link = document.createElement('a');
                link.download = `임마누엘_출석부_${dateInput.value}.png`;
                link.href = canvas.toDataURL();
                link.click();
                revertCapture();
            });
        }, 100);
    });

    document.getElementById('pdfBtn').addEventListener('click', () => {
        prepareCapture();
        setTimeout(() => {
            html2canvas(document.getElementById('capture-area'), {scale: 2}).then(canvas => {
                const imgData = canvas.toDataURL('image/png');
                const pdf = new window.jspdf.jsPDF('p', 'mm', 'a4');
                const imgHeight = canvas.height * 210 / canvas.width;
                pdf.addImage(imgData, 'PNG', 0, 10, 210, imgHeight);
                pdf.save(`임마누엘_출석부_${dateInput.value}.pdf`);
                revertCapture();
            });
        }, 100);
    });

    init();
</script>
</body>
</html>
