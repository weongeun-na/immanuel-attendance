<html lang="ko">
<head>

    <style>
        /* 기본 스타일 셋팅 (기존 디자인 최대한 유지) */
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #f4f4f9; padding: 10px; margin: 0; }
        .header-box { background: white; border: 2px solid #333; padding: 15px; text-align: center; margin-bottom: 10px; position: relative; }
        .header-box h2 { margin: 0 0 10px 0; font-size: 20px; }
        .date-text { color: #0056b3; font-size: 22px; font-weight: bold; margin-bottom: 5px; cursor: pointer; }
        .week-range { font-size: 14px; color: #666; }
        
        .loading-text { color: #d9534f; font-weight: bold; margin-top: 10px; }
        
        table { width: 100%; border-collapse: collapse; background: white; text-align: center; font-size: 14px; }
        th, td { border: 1px solid #999; padding: 8px 4px; }
        th { background-color: #dcedc8; font-weight: bold; } /* 연두색 헤더 */
        .summary-row { background-color: #fff9c4; font-weight: bold; color: #d32f2f; } /* 노란색 요약 줄 */
        
        .btn-reason { background-color: #424242; color: white; border: none; padding: 4px 8px; border-radius: 4px; font-size: 12px; cursor: pointer; }
        .btn-top-right { position: absolute; top: 15px; right: 15px; background-color: #333; color: white; padding: 6px 10px; border: none; border-radius: 5px; }
    </style>
</head>

        <div class="loading-text" id="loading-msg">데이터 로딩 중...</div>
