<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>2026년 임마누엘 목장 출석부 (관리자)</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><path fill=%22%23800000%22 d=%22M15 45L50 15L85 45V90H15V45Z M45 45V28H55V45H45Z M45 70V80H55V70H45Z%22/></svg>">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; margin: 0; padding: 5px; background-color: #f4f4f9; -webkit-tap-highlight-color: transparent; }
        
        #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #f4f4f9; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .login-box { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 0 15px rgba(0,0,0,0.1); text-align: center; width: 80%; max-width: 300px; }
        .login-box h2 { margin-top: 0; color: #1976D2; letter-spacing: -1px; }
        .login-box input { width: 100%; padding: 12px; margin: 15px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-size: 16px; text-align: center; letter-spacing: 2px; }
        .login-box button { width: 100%; padding: 12px; background: #1976D2; color: white; border: none; border-radius: 5px; font-size: 16px; font-weight: bold; cursor: pointer; }

        .container { max-width: 900px; margin: 0 auto; background: white; padding: 5px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .header { display: flex; flex-direction: column; align-items: center; border: 2px solid #333; padding: 10px 5px; margin-bottom: 5px; text-align: center; position: relative; }
        .header-top { display: flex; justify-content: space-between; align-items: center; width: 100%; margin-bottom: 5px; }
        .header-spacer { width: 70px; } 
        .header-title { font-size: 16px; font-weight: bold; flex: 1; }
        .btn-settings { background: #333; color: white; border: none; border-radius: 4px; padding: 6px 8px; font-size: 11px; cursor: pointer; width: 70px; }
        
        .date-input { font-size: 16px; border: none; outline: none; color: #0044cc; font-weight: bold; text-align: center; background: transparent; cursor: pointer; }
        .week-label { font-size: 12px; color: #0044cc; font-weight: bold; margin-top: 3px; padding: 3px 8px; border-radius: 3px; background-color: #e3f2fd; }
        
        .summary-box { display: flex; flex-wrap: wrap; justify-content: space-evenly; align-items: center; margin-bottom: 8px; font-weight: bold; color: #d32f2f; font-size: 11px; background: #fff8e1; padding: 5px 2px; border: 1px solid #333; gap: 3px; }
        .summary-box span { color: #0044cc; margin: 0 1px; font-size: 12px; }

        .mobile-table { width: 100%; border-collapse: collapse; text-align: center; table-layout: fixed; }
        .mobile-table th, .mobile-table td { border: 1px solid #333; padding: 5px 0; font-size: 10.5px; line-height: 1.2; word-break: keep-all; }
        
        /* 💡 10열 레이아웃 최적화 (주일밤 추가) */
        .col-role { width: 9%; } 
        .col-name { width: 13.5%; } 
        .col-check { width: 8.5%; } /* 주일, 주밤, 화, 수, 금, 마을 = 6개 */
        .col-etc { width: 10.5%; } 
        .col-manage { width: 16%; } /* 버튼 공간 넉넉히 확보 */
        
        .village-header-row { background-color: #c8e6c9; }
        .village-header-name { font-weight: bold; text-align: left; padding-left: 5px; font-size: 12px; letter-spacing: -0.5px; }
        .village-header-row th { background-color: #c8e6c9; font-weight: bold; font-size: 10px; color: #333; padding: 3px 0; }
        
        .check-cell { cursor: pointer; font-weight: bold; font-size: 15px; user-select: none; background-color: #fafafa; }
        .check-cell:active { background-color: #e3f2fd; }
        
        .admin-btn { padding: 8px 12px; margin: 3px; cursor: pointer; border: none; border-radius: 5px; color: white; font-weight: bold; font-size: 12px; }
        .btn-img { background-color: #4CAF50; } .btn-pdf { background-color: #d32f2f; }
        .btn-add { background-color: #1976D2; width: 100%; margin-top: 10px; padding: 12px; font-size: 15px; }
        
        /* 관리 및 순서 이동 버튼 스타일 */
        .btn-manage { background-color: #424242; padding: 4px; font-size: 10px; color: white; border-radius: 3px; border: none; cursor: pointer; }
        .manage-controls { display: flex; flex-direction: column; gap: 2px; padding: 2px; }
        .move-controls { display: flex; gap: 2px; width: 100%; }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 20px; border-radius: 10px; width: 90%; max-width: 350px; box-sizing: border-box; }
        .modal-content h3 { margin-top: 0; color: #1976D2; border-bottom: 2px solid #1976D2; padding-bottom: 10px; text-align: center; }
        .modal-content label { display: block; margin: 10px 0 5px; font-weight: bold; font-size: 12px; }
        .modal-content select, .modal-content input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-size: 14px; }
        .modal-btns { display: flex; gap: 8px; margin-top: 20px; }
        .modal-btns button { flex: 1; padding: 12px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 14px; }
        .opt-btn { padding: 10px 15px; background: #e0e0e0; border: none; border-radius: 5px; font-weight: bold; margin: 5px; cursor: pointer; font-size: 14px; }

        #print-view { display: none; width: 1100px; background: white; padding: 20px; box-sizing: border-box; margin: 0 auto; }
        .print-header-area { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 10px; }
        .print-title { font-size: 28px; font-weight: bold; letter-spacing: -1px; }
        .print-summary-tbl { border-collapse: collapse; text-align: center; border: 2px solid #000; font-size: 12px; font-weight: bold; }
        .print-summary-tbl th, .print-summary-tbl td { border: 1px solid #000; padding: 4px 10px; }
        .print-summary-tbl th { background-color: #f0f0f0; }
        .print-grid { display: flex; gap: 15px; width: 100%; }
        .print-table { width: 100%; border-collapse: collapse; text-align: center; font-size: 11px; border: 2px solid #000; table-layout: fixed; }
        .print-table th, .print-table td { border: 1px solid #000; padding: 3px 1px; }
        .print-village-title { font-weight: bold; font-size: 12px; text-align: left; padding-left: 5px; background-color: #c8e6c9; }
    </style>
</head>

<script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

    try {
        const firebaseConfig = {
            apiKey: "AIzaSyDOfUlA-aQfnNvxTm5X5MkOYPh7JRkAT-w",
            authDomain: "immanuel-attendance.firebaseapp.com",
            databaseURL: "https://immanuel-attendance-default-rtdb.firebaseio.com",
            projectId: "immanuel-attendance"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let members = []; let attendanceData = {}; let attOptions = [];
        const dateInput = document.getElementById('currentDate');

        let currentCheckIdx = null; let currentManageIdx = null;

        let audioCtx = null;
        window.unlockAudio = function() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        };

        function playSound() {
            try { unlockAudio(); const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain(); osc.connect(gain); gain.connect(audioCtx.destination); osc.frequency.setValueAtTime(880, audioCtx.currentTime); gain.gain.setValueAtTime(0.2, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1); osc.start(); osc.stop(audioCtx.currentTime + 0.1); } catch(e) {}
        }

        function getWeekKey(dateStr) {
            let d = new Date();
            if (dateStr) {
                let parsed = new Date(dateStr.replace(/[\.\/]/g, '-'));
                if (!isNaN(parsed.getTime())) d = parsed;
            }
            const day = d.getDay(); 
            const diff = (day >= 2) ? (day - 2) : (day + 5);
            d.setDate(d.getDate() - diff); 
            
            const year = d.getFullYear();
            const month = String(d.getMonth() + 1).padStart(2, '0');
            const date = String(d.getDate()).padStart(2, '0');
            return `${year}-${month}-${date}`;
        }

        dateInput.addEventListener('change', loadData);

        function init() {
            onValue(ref(db, 'settings/etcOptions'), snap => {
                try { let val = snap.val(); if (val && !Array.isArray(val)) val = Object.values(val); attOptions = (val && val.length > 0) ? val : ['병원', '시외', '여행', '기타']; } catch(e) { attOptions = ['병원', '시외', '여행', '기타']; }
            });

            onValue(ref(db, 'members'), (snap) => {
                try {
                    const data = snap.val();
                    if (!data) { members = []; } 
                    else {
                        let dataArr = Array.isArray(data) ? data : Object.values(data);
                        members = dataArr.filter(m => m && typeof m === 'object');
                    }
                    // 마을 번호 순서대로만 정렬 (이후 자유로운 순서 배치를 위해 직분 자동정렬은 뺐습니다)
                    const vOrder = Array.from({length:20}, (_, i) => `${i+1}.`);
                    members.sort((a, b) => vOrder.findIndex(v => (a.village||"").startsWith(v)) - vOrder.findIndex(v => (b.village||"").startsWith(v)));
                    renderTable();
                } catch(e) {}
            });
            loadData();
        }

        function loadData() {
            const weekKey = getWeekKey(dateInput.value);
            if (!weekKey) return;
            document.getElementById('weekRange').innerText = `${weekKey} (화) 시작 주간`;
            onValue(ref(db, `attendance/${weekKey}`), (snap) => { attendanceData = snap.val() || {}; renderTable(); });
        }

        function renderTable() {
            try {
                const tbody = document.getElementById('mobileBody'); 
                if(!tbody) return;
                tbody.innerHTML = '';
                let c = { sun: 0, sun_night: 0, tue: 0, wed: 0, fri: 0, vil: 0 };
                let currentVil = "";

                members.forEach((m, idx) => {
                    if(!m) return;
                    const ch = attendanceData[idx] || {};
                    if(ch.sun) c.sun++; if(ch.sun_night) c.sun_night++; if(ch.tue) c.tue++; if(ch.wed) c.wed++; if(ch.fri) c.fri++; if(ch.vil) c.vil++;
                    
                    if (m.village !== currentVil) {
                        const trH = document.createElement('tr');
                        trH.className = 'village-header-row';
                        trH.innerHTML = `
                            <td colspan="2" class="village-header-name">${m.village || "미지정"}</td>
                            <th>주일</th><th>주밤</th><th>화요</th><th>수요</th><th>금요</th><th>마을</th><th>기타</th><th class="hide-on-print">관리</th>
                        `;
                        tbody.appendChild(trH);
                        currentVil = m.village;
                    }
                    
                    const safeName = m.name ? String(m.name) : "";
                    const dName = safeName.includes('(') ? safeName.replace('(', '<br>(') : safeName;
                    const tr = document.createElement('tr');
                    
                    // 💡 관리자용 위/아래 이동 화살표 삽입 완료
                    tr.innerHTML = `
                        <td>${m.role || ""}</td><td>${dName}</td>
                        <td class="check-cell" onclick="toggleCheck(${idx}, 'sun')">${ch.sun?'<span style="color:#0044cc;">O</span>':''}</td>
                        <td class="check-cell" onclick="toggleCheck(${idx}, 'sun_night')">${ch.sun_night?'<span style="color:#0044cc;">O</span>':''}</td>
                        <td class="check-cell" onclick="toggleCheck(${idx}, 'tue')">${ch.tue?'<span style="color:#0044cc;">O</span>':''}</td>
                        <td class="check-cell" onclick="toggleCheck(${idx}, 'wed')">${ch.wed?'<span style="color:#0044cc;">O</span>':''}</td>
                        <td class="check-cell" onclick="toggleCheck(${idx}, 'fri')">${ch.fri?'<span style="color:#0044cc;">O</span>':''}</td>
                        <td class="check-cell" onclick="toggleCheck(${idx}, 'vil')">${ch.vil?'<span style="color:#0044cc;">O</span>':''}</td>
                        <td class="check-cell" onclick="openEtcCheck(${idx})">${ch.etc?`<span style="color:#d32f2f; font-size:10px; font-weight:bold;">${ch.etc}</span>`:''}</td>
                        <td class="hide-on-print">
                            <div class="manage-controls">
                                <button class="btn-manage" style="width:100%;" onclick="openManage(${idx})">관리</button>
                                <div class="move-controls">
                                    <button class="btn-manage" style="flex:1; background:#757575;" onclick="moveRow(${idx}, -1)">▲</button>
                                    <button class="btn-manage" style="flex:1; background:#757575;" onclick="moveRow(${idx}, 1)">▼</button>
                                </div>
                            </div>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
                
                document.getElementById('tot-sun').innerText = c.sun; document.getElementById('tot-sun_night').innerText = c.sun_night; document.getElementById('tot-tue').innerText = c.tue;
                document.getElementById('tot-wed').innerText = c.wed; document.getElementById('tot-fri').innerText = c.fri; document.getElementById('tot-vil').innerText = c.vil;
                
                buildPrintGrid();
                const dObj = new Date(getWeekKey(dateInput.value));
                document.getElementById('printDateTxt').innerText = `(${dObj.getFullYear()}년 ${dObj.getMonth()+1}월 ${dObj.getDate()}일)`;
            } catch(e) {}
        }

        window.toggleCheck = (idx, day) => {
            const weekKey = getWeekKey(dateInput.value);
            const currentVal = attendanceData[idx] ? attendanceData[idx][day] : false;
            set(ref(db, `attendance/${weekKey}/${idx}/${day}`), !currentVal);
            playSound();
        };

        // 💡 명단 순서 위/아래 이동 엔진 (체크표시도 함께 이동합니다!)
        window.moveRow = (idx, dir) => {
            const targetIdx = idx + dir;
            if (targetIdx < 0 || targetIdx >= members.length) return;
            
            if ((members[idx].village || "") !== (members[targetIdx].village || "")) {
                alert("다른 마을 구역으로는 순서를 이동할 수 없습니다.");
                return;
            }

            // 1. 멤버 배열 위치 교환
            const tempMem = members[idx];
            members[idx] = members[targetIdx];
            members[targetIdx] = tempMem;
            set(ref(db, 'members'), members);

            // 2. 현재 주간의 출석 데이터도 위치 교환 (체크표시 꼬임 방지)
            const weekKey = getWeekKey(dateInput.value);
            const att1 = attendanceData[idx];
            const att2 = attendanceData[targetIdx];
            set(ref(db, `attendance/${weekKey}/${idx}`), att2 || null);
            set(ref(db, `attendance/${weekKey}/${targetIdx}`), att1 || null);
            
            playSound();
        };

        window.openEtcCheck = (idx) => {
            currentCheckIdx = idx;
            const container = document.getElementById('check-buttons'); container.innerHTML = '';
            attOptions.forEach((opt) => {
                const btn = document.createElement('button'); btn.className = 'opt-btn'; btn.innerText = opt;
                btn.onclick = () => saveEtcCheck(opt); container.appendChild(btn);
            });
            const clearBtn = document.createElement('button'); clearBtn.className = 'opt-btn'; clearBtn.style.width = '100%'; clearBtn.innerText = "초기화 (빈칸)";
            clearBtn.onclick = () => saveEtcCheck(""); container.appendChild(clearBtn);
            document.getElementById('check-modal').style.display = 'flex';
        };

        window.saveEtcCheck = (val) => { const weekKey = getWeekKey(dateInput.value); set(ref(db, `attendance/${weekKey}/${currentCheckIdx}/etc`), val); playSound(); closeModal('check-modal'); };
        window.closeModal = (id) => document.getElementById(id).style.display = 'none';

        window.openSettings = () => { document.getElementById('settings-options').value = attOptions.join(', '); document.getElementById('settings-modal').style.display = 'flex'; };
        window.saveSettings = () => { const opts = document.getElementById('settings-options').value.split(',').map(s=>s.trim()).filter(s=>s); if(opts.length>0) set(ref(db, 'settings/etcOptions'), opts); closeModal('settings-modal'); };

        window.openAdd = () => { currentManageIdx = null; document.getElementById('manage-title').innerText = "새 인원 추가"; document.getElementById('manage-role').value = ""; document.getElementById('manage-name').value = ""; document.getElementById('btn-delete-member').style.display = "none"; document.getElementById('manage-modal').style.display = 'flex'; };
        window.openManage = (idx) => {
            currentManageIdx = idx; const m = members[idx]; document.getElementById('manage-title').innerText = "인원 정보 수정";
            document.getElementById('manage-village').value = m.village; document.getElementById('manage-role').value = m.role; document.getElementById('manage-name').value = m.name;
            document.getElementById('btn-delete-member').style.display = "block"; document.getElementById('manage-modal').style.display = 'flex';
        };
        window.saveManage = () => {
            const v = document.getElementById('manage-village').value, r = document.getElementById('manage-role').value, n = document.getElementById('manage-name').value;
            if(!n) return alert("이름을 입력하세요.");
            if(currentManageIdx === null) { members.push({ village:v, role:r, name:n }); } else { members[currentManageIdx] = { village:v, role:r, name:n }; }
            set(ref(db, 'members'), members); closeModal('manage-modal');
        };
        window.confirmDelete = () => { if(confirm("정말 이 인원을 삭제하시겠습니까?")) { members.splice(currentManageIdx, 1); set(ref(db, 'members'), members); closeModal('manage-modal'); } };

        function buildPrintGrid() {
            try {
                const tLeft = document.getElementById('printLeftBodyArea'); const tRight = document.getElementById('printRightBodyArea');
                if(!tLeft || !tRight) return;
                tLeft.innerHTML = ''; tRight.innerHTML = '';
                
                const allVils = [...new Set(members.map(m => m.village || "미지정"))];
                const half = Math.ceil(allVils.length / 2);
                
                const generateHtml = (vils) => {
                    let h = '<table class="print-table"><colgroup><col style="width:16%"><col style="width:12%"><col style="width:12%"><col style="width:12%"><col style="width:12%"><col style="width:12%"><col style="width:12%"><col style="width:12%"></colgroup><tbody>';
                    vils.forEach(vName => {
                        const vMems = members.filter(m => (m.village || "미지정") === vName);
                        h += `<tr style="background-color:#c8e6c9"><td class="print-village-title" colspan="8">${vName}</td></tr><tr style="background-color:#c8e6c9"><th>이름</th><th>주일</th><th>주밤</th><th>화요</th><th>수요</th><th>금요</th><th>마을</th><th>기타</th></tr>`;
                        vMems.forEach(m => {
                            const idx = members.indexOf(m); const ch = attendanceData[idx] || {};
                            const safeName = m.name ? String(m.name) : "";
                            h += `<tr><td>${m.role?m.role+' ':''}${safeName}</td><td>${ch.sun?'O':''}</td><td>${ch.sun_night?'O':''}</td><td>${ch.tue?'O':''}</td><td>${ch.wed?'O':''}</td><td>${ch.fri?'O':''}</td><td>${ch.vil?'O':''}</td><td style="font-size:9px; color:#d32f2f; font-weight:bold;">${ch.etc||''}</td></tr>`;
                        });
                    });
                    return h + '</tbody></table>';
                };
                tLeft.innerHTML = generateHtml(allVils.slice(0, half)); tRight.innerHTML = generateHtml(allVils.slice(half));
            } catch(e) {}
        }

        document.getElementById('imgBtn').addEventListener('click', () => {
            document.getElementById('capture-area').style.display = 'none'; 
            document.getElementById('print-view').style.display = 'block';
            window.scrollTo(0,0);
            
            document.getElementById('print-tot-sun').innerText = document.getElementById('tot-sun').innerText;
            document.getElementById('print-tot-vil').innerText = document.getElementById('tot-vil').innerText;

            setTimeout(() => { 
                html2canvas(document.getElementById('print-view'), {scale: 2, backgroundColor: "#ffffff"}).then(canvas => {
                    const link = document.createElement('a'); 
                    link.download = `임마누엘_${getWeekKey(dateInput.value)}.png`; 
                    link.href = canvas.toDataURL("image/png"); 
                    link.click();
                    document.getElementById('print-view').style.display = 'none'; 
                    document.getElementById('capture-area').style.display = 'block';
                }); 
            }, 500);
        });

        document.getElementById('pdfBtn').addEventListener('click', () => {
            document.getElementById('capture-area').style.display = 'none'; 
            document.getElementById('print-view').style.display = 'block';
            window.scrollTo(0,0);
            
            document.getElementById('print-tot-sun').innerText = document.getElementById('tot-sun').innerText;
            document.getElementById('print-tot-vil').innerText = document.getElementById('tot-vil').innerText;

            setTimeout(() => { 
                html2canvas(document.getElementById('print-view'), {scale: 2, backgroundColor: "#ffffff"}).then(canvas => {
                    const pdf = new window.jspdf.jsPDF('l', 'mm', 'a4'); 
                    const imgWidth = 297;
                    const imgHeight = canvas.height * imgWidth / canvas.width;
                    pdf.addImage(canvas.toDataURL('image/png'), 'PNG', 0, 10, imgWidth, imgHeight);
                    pdf.save(`임마누엘_${getWeekKey(dateInput.value)}.pdf`);
                    document.getElementById('print-view').style.display = 'none'; 
                    document.getElementById('capture-area').style.display = 'block';
                }); 
            }, 500);
        });

        init();
    } catch(err) {}
</script>
</body>
</html>
