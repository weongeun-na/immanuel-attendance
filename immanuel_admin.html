<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>2026년 임마누엘 목장 출석부 (관리자)</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><path fill=%22%23800000%22 d=%22M15 45L50 15L85 45V90H15V45Z M45 45V28H55V45H45Z M45 70V80H55V70H45Z%22/></svg>">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><path fill=%22%23800000%22 d=%22M15 45L50 15L85 45V90H15V45Z M45 45V28H55V45H45Z M45 70V80H55V70H45Z%22/></svg>">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; margin: 0; padding: 10px; background-color: #f4f4f9; }
        
        /* 모바일 화면 전용 디자인 */
        #mobile-view { max-width: 900px; margin: 0 auto; background: white; padding: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .header { display: flex; flex-direction: column; align-items: center; gap: 8px; border: 2px solid #333; padding: 15px 5px; margin-bottom: 10px; text-align: center; }
        .header-title { font-size: 18px; font-weight: bold; }
        .date-input { font-size: 18px; border: none; outline: none; color: #0044cc; font-weight: bold; font-family: inherit; text-align: center; }
        
        .summary-box { display: flex; justify-content: space-evenly; align-items: center; margin-bottom: 15px; font-weight: bold; color: #d32f2f; font-size: 13px; background: #fff8e1; padding: 10px 2px; border: 1px solid #333; letter-spacing: -0.5px; flex-wrap: wrap; gap: 5px; }
        .summary-box div { white-space: nowrap; }
        .summary-box span { color: #0044cc; margin: 0 2px; font-size: 14px; }

        .mobile-table { width: 100%; border-collapse: collapse; text-align: center; table-layout: fixed; }
        .mobile-table th, .mobile-table td { border: 1px solid #333; padding: 8px 1px; font-size: 11px; }
        .mobile-table th { background-color: #fff8e1; word-break: keep-all; }
        
        .mobile-table th:nth-child(1) { width: 15%; } 
        .mobile-table th:nth-child(2) { width: 12%; } 
        .mobile-table th:nth-child(3) { width: 20%; } 
        .mobile-table th:nth-child(4), .mobile-table th:nth-child(5), .mobile-table th:nth-child(6), .mobile-table th:nth-child(7), .mobile-table th:nth-child(8) { width: 8%; } 
        .mobile-table th:nth-child(9) { width: 12%; } 
        
        .check-cell { cursor: pointer; color: #0044cc; font-weight: bold; font-size: 14px; user-select: none; }
        .check-cell:hover { background-color: #e3f2fd; }
        .village-divider { border-bottom: 2px solid #000; }
        .admin-btn { padding: 8px 15px; margin: 5px; cursor: pointer; border: none; border-radius: 5px; color: white; font-weight: bold; }
        .btn-img { background-color: #4CAF50; }
        .btn-pdf { background-color: #d32f2f; }
        .btn-add { background-color: #1976D2; width: 100%; margin-top: 10px; padding: 12px; font-size: 16px; }
        .btn-del { background-color: #ff9800; padding: 4px 6px; font-size: 11px; cursor: pointer; }

        /* 🖨️ 인쇄 전용(A4) 디자인 */
        #print-view { display: none; width: 1100px; background: white; padding: 20px; box-sizing: border-box; }
        .print-header-area { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 10px; }
        .print-title { font-size: 28px; font-weight: bold; letter-spacing: -1px; }
        .print-date { font-size: 16px; font-weight: normal; margin-left: 10px; }
        
        /* 출력물 요약표 원래대로 심플하게 2개 복구 */
        .print-summary-tbl { border-collapse: collapse; text-align: center; border: 2px solid #000; font-size: 12px; font-weight: bold; }
        .print-summary-tbl th, .print-summary-tbl td { border: 1px solid #000; padding: 4px 10px; }
        .print-summary-tbl th { background-color: #f0f0f0; }
        
        .print-grid { display: flex; gap: 15px; width: 100%; }
        .print-table { width: 50%; border-collapse: collapse; text-align: center; font-size: 11px; border: 2px solid #000; table-layout: fixed; }
        .print-table th, .print-table td { border: 1px solid #000; padding: 3px 1px; }
        .print-table thead th { background-color: #e8f5e9; font-weight: bold; }
        .print-village-title { background-color: #c8e6c9 !important; font-weight: bold; letter-spacing: 1px; font-size: 12px; }
        
        .col-name { width: 28%; }
        .col-chk { width: 6%; color: #0044cc; font-weight: bold; }
    </style>
</head>
<body>

<div style="text-align: center; margin-bottom: 10px;">
    <button class="admin-btn btn-img" id="imgBtn">🖼️ 이미지 저장</button>
    <button class="admin-btn btn-pdf" id="pdfBtn">📄 PDF 저장</button>
</div>

<div id="mobile-view">
    <div class="header">
        <div class="header-title">2026년 임마누엘 목장 출석부 (관리자)</div>
        <div><input type="date" class="date-input" id="currentDate"></div>
    </div>

    <div class="summary-box">
        <div>주일:<span id="tot-sun">0</span></div>
        <div>화요:<span id="tot-tue">0</span></div>
        <div>수요:<span id="tot-wed">0</span></div>
        <div>금요:<span id="tot-fri">0</span></div>
        <div>마을:<span id="tot-vil">0</span></div>
    </div>

    <table class="mobile-table">
        <thead>
            <tr>
                <th>마을</th><th>직분</th><th>이름</th>
                <th>주일</th><th>화요</th><th>수요</th><th>금요</th><th>마을</th>
                <th>관리</th>
            </tr>
        </thead>
        <tbody id="mobileBody"></tbody>
    </table>
    <button class="admin-btn btn-add" id="addBtn">+ 새 인원 추가</button>
</div>

<div id="print-view">
    <div class="print-header-area">
        <div class="print-title" id="printTitle">임마누엘 목장 <span class="print-date" id="printDateTxt">(2026년 월 일)</span></div>
        
        <table class="print-summary-tbl">
            <tr>
                <th>주일</th><th>마을</th><th rowspan="2" style="padding: 0 15px;">계</th>
            </tr>
            <tr>
                <td id="print-tot-sun" style="color:#d32f2f;">0</td>
                <td id="print-tot-vil" style="color:#d32f2f;">0</td>
            </tr>
        </table>
    </div>
    
    <div class="print-grid">
        <table class="print-table">
            <thead>
                <tr>
                    <th rowspan="2" class="col-name">성 명</th><th class="col-chk">주</th><th class="col-chk">화</th><th class="col-chk">수</th><th class="col-chk">금</th><th class="col-chk">마</th>
                    <th rowspan="2" class="col-name">성 명</th><th class="col-chk">주</th><th class="col-chk">화</th><th class="col-chk">수</th><th class="col-chk">금</th><th class="col-chk">마</th>
                </tr>
                <tr>
                    <th>일</th><th>요</th><th>요</th><th>요</th><th>을</th>
                    <th>일</th><th>요</th><th>요</th><th>요</th><th>을</th>
                </tr>
            </thead>
            <tbody id="printLeftBody"></tbody>
        </table>
        <table class="print-table">
            <thead>
                <tr>
                    <th rowspan="2" class="col-name">성 명</th><th class="col-chk">주</th><th class="col-chk">화</th><th class="col-chk">수</th><th class="col-chk">금</th><th class="col-chk">마</th>
                    <th rowspan="2" class="col-name">성 명</th><th class="col-chk">주</th><th class="col-chk">화</th><th class="col-chk">수</th><th class="col-chk">금</th><th class="col-chk">마</th>
                </tr>
                <tr>
                    <th>일</th><th>요</th><th>요</th><th>요</th><th>을</th>
                    <th>일</th><th>요</th><th>요</th><th>요</th><th>을</th>
                </tr>
            </thead>
            <tbody id="printRightBody"></tbody>
        </table>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getDatabase, ref, onValue, set, get } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDOfUlA-aQfnNvxTm5X5MkOYPh7JRkAT-w",
        authDomain: "immanuel-attendance.firebaseapp.com",
        databaseURL: "https://immanuel-attendance-default-rtdb.firebaseio.com",
        projectId: "immanuel-attendance",
        storageBucket: "immanuel-attendance.firebasestorage.app",
        messagingSenderId: "1027964994475",
        appId: "1:1027964994475:web:4e21453cc5ce2c11ab48ee"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let members = [];
    let attendanceData = {};
    const dateInput = document.getElementById('currentDate');
    
    dateInput.valueAsDate = new Date();
    dateInput.addEventListener('change', loadData);

    let audioCtx;
    function playSound(isCheck) {
        try {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = 'sine';
            osc.frequency.setValueAtTime(isCheck ? 880 : 440, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.start(audioCtx.currentTime);
            osc.stop(audioCtx.currentTime + 0.1);
            setTimeout(() => { osc.disconnect(); gain.disconnect(); }, 200);
        } catch(e) {}
    }

    async function init() {
        const membersRef = ref(db, 'members');
        onValue(membersRef, (snap) => {
            let loadedMembers = snap.val() || [];
            loadedMembers = loadedMembers.filter(m => m !== null && m !== undefined);
            const uniqueVillages = [...new Set(loadedMembers.map(m => m.village))];
            members = loadedMembers.sort((a, b) => uniqueVillages.indexOf(a.village) - uniqueVillages.indexOf(b.village));
            renderTable();
        });
        loadData();
    }

    function loadData() {
        const dateStr = dateInput.value;
        onValue(ref(db, `attendance/${dateStr}`), (snap) => {
            attendanceData = snap.val() || {};
            renderTable();
        });
    }

    function renderTable() {
        const tbodyMobile = document.getElementById('mobileBody');
        tbodyMobile.innerHTML = '';
        
        let cSun = 0, cTue = 0, cWed = 0, cFri = 0, cVil = 0;

        members.forEach((m, idx) => {
            if(!m) return;
            const checks = attendanceData[idx] || {};
            if(checks.sun) cSun++; if(checks.tue) cTue++;
            if(checks.wed) cWed++; if(checks.fri) cFri++; if(checks.vil) cVil++; 

            const tr = document.createElement('tr');
            const isLast = (idx === members.length - 1) || (members[idx+1].village !== m.village);
            if(isLast) tr.classList.add('village-divider');
            
            let dName = m.name.includes('(') ? m.name.replace('(', '<br>(') : m.name;
            
            // 모바일 테이블 데이터 요일 순서 맞춤
            tr.innerHTML = `
                <td>${m.village}</td><td>${m.role}</td><td>${dName}</td>
                <td class="check-cell" onclick="toggleCheck(${idx}, 'sun')">${checks.sun ? 'O' : ''}</td>
                <td class="check-cell" onclick="toggleCheck(${idx}, 'tue')">${checks.tue ? 'O' : ''}</td>
                <td class="check-cell" onclick="toggleCheck(${idx}, 'wed')">${checks.wed ? 'O' : ''}</td>
                <td class="check-cell" onclick="toggleCheck(${idx}, 'fri')">${checks.fri ? 'O' : ''}</td>
                <td class="check-cell" onclick="toggleCheck(${idx}, 'vil')">${checks.vil ? 'O' : ''}</td>
                <td><button class="admin-btn btn-del" onclick="deleteMember(${idx})">삭제</button></td>
            `;
            tbodyMobile.appendChild(tr);
        });
        
        document.getElementById('tot-sun').innerText = cSun; document.getElementById('tot-tue').innerText = cTue;
        document.getElementById('tot-wed').innerText = cWed; document.getElementById('tot-fri').innerText = cFri; document.getElementById('tot-vil').innerText = cVil; 
        
        // 인쇄 요약표(2칸) 데이터 업데이트
        document.getElementById('print-tot-sun').innerText = cSun; 
        document.getElementById('print-tot-vil').innerText = cVil; 

        // 인쇄 화면(2단) 그리기
        const allVillages = [...new Set(members.map(m => m.village))];
        const half = Math.ceil(allVillages.length / 2);
        const vLeft = allVillages.slice(0, half);
        const vRight = allVillages.slice(half);

        buildPrintGrid(vLeft, document.getElementById('printLeftBody'));
        buildPrintGrid(vRight, document.getElementById('printRightBody'));
        
        const dObj = new Date(dateInput.value);
        document.getElementById('printDateTxt').innerText = `(${dObj.getFullYear()}년 ${dObj.getMonth()+1}월 ${dObj.getDate()}일)`;
    }

    function buildPrintGrid(villages, tbodyObj) {
        tbodyObj.innerHTML = '';
        villages.forEach(vName => {
            const vMems = members.filter(m => m.village === vName);
            if(vMems.length === 0) return;

            const trHead = document.createElement('tr');
            trHead.innerHTML = `<td colspan="12" class="print-village-title">${vName}</td>`;
            tbodyObj.appendChild(trHead);

            const mid = Math.ceil(vMems.length / 2);
            const col1 = vMems.slice(0, mid);
            const col2 = vMems.slice(mid);

            for(let i=0; i < col1.length; i++) {
                const tr = document.createElement('tr');
                let html = '';
                
                const m1 = col1[i];
                if(m1) {
                    const idx = members.indexOf(m1);
                    const c = attendanceData[idx] || {};
                    const roleTag = m1.role ? `<span style="font-size:10px; color:#555;">${m1.role}</span> ` : '';
                    // 출력물 요일 순서 맞춤 (주, 화, 수, 금, 마)
                    html += `<td>${roleTag}${m1.name}</td><td>${c.sun?'O':''}</td><td>${c.tue?'O':''}</td><td>${c.wed?'O':''}</td><td>${c.fri?'O':''}</td><td>${c.vil?'O':''}</td>`;
                } else { html += `<td></td><td></td><td></td><td></td><td></td><td></td>`; }

                const m2 = col2[i];
                if(m2) {
                    const idx = members.indexOf(m2);
                    const c = attendanceData[idx] || {};
                    const roleTag = m2.role ? `<span style="font-size:10px; color:#555;">${m2.role}</span> ` : '';
                    html += `<td>${roleTag}${m2.name}</td><td>${c.sun?'O':''}</td><td>${c.tue?'O':''}</td><td>${c.wed?'O':''}</td><td>${c.fri?'O':''}</td><td>${c.vil?'O':''}</td>`;
                } else { html += `<td></td><td></td><td></td><td></td><td></td><td></td>`; }

                tr.innerHTML = html;
                tbodyObj.appendChild(tr);
            }
        });
    }

    window.toggleCheck = (idx, day) => {
        const dateStr = dateInput.value;
        const current = attendanceData[idx]?.[day] || false;
        const nextState = !current;
        set(ref(db, `attendance/${dateStr}/${idx}/${day}`), nextState);
        playSound(nextState);
    };

    window.deleteMember = (idx) => {
        const cleanName = members[idx].name.replace('<br>', '');
        if(confirm(`[${cleanName}] 성도님을 삭제하시겠습니까?`)) {
            members.splice(idx, 1);
            set(ref(db, 'members'), members.filter(m => m !== null));
        }
    };

    document.getElementById('addBtn').addEventListener('click', () => {
        const v = prompt("마을 이름을 입력하세요 (예: 15. 만석 마을)");
        const r = prompt("직분을 입력하세요 (없으면 빈칸)");
        const n = prompt("이름을 입력하세요");
        if(v && n) {
            members.push({ village: v, role: r, name: n });
            set(ref(db, 'members'), members);
        }
    });

    function executeCapture(isPdf) {
        document.getElementById('mobile-view').style.display = 'none';
        document.getElementById('print-view').style.display = 'block';
        
        setTimeout(() => { 
            html2canvas(document.getElementById('print-view'), {scale: 2}).then(canvas => {
                if (isPdf) {
                    const imgData = canvas.toDataURL('image/png');
                    const pdf = new window.jspdf.jsPDF('l', 'mm', 'a4'); 
                    const imgWidth = 297; 
                    const imgHeight = canvas.height * imgWidth / canvas.width;
                    pdf.addImage(imgData, 'PNG', 0, 10, imgWidth, imgHeight);
                    pdf.save(`임마누엘_출석부_${dateInput.value}.pdf`);
                } else {
                    const link = document.createElement('a');
                    link.download = `임마누엘_출석부_${dateInput.value}.png`;
                    link.href = canvas.toDataURL();
                    link.click();
                }
                document.getElementById('print-view').style.display = 'none';
                document.getElementById('mobile-view').style.display = 'block';
            });
        }, 150);
    }

    document.getElementById('imgBtn').addEventListener('click', () => executeCapture(false));
    document.getElementById('pdfBtn').addEventListener('click', () => executeCapture(true));

    init();
</script>
</body>
</html>
